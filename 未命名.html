<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SQE 学习系统（三模块版）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .q-en { font-size:0.95rem; color:#111827; margin-bottom:6px; line-height:1.5; }
    .q-cn { font-size:0.95rem; color:#374151; margin-bottom:12px; line-height:1.5; }
    .opt-en { font-size:0.9rem; color:#111827; }
    .opt-cn { font-size:0.9rem; color:#4b5563; margin-top:2px; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
<div class="max-w-4xl mx-auto p-4">
  <h1 class="text-xl font-bold mb-1 text-center">SQE 学习系统</h1>
  <p class="text-center text-sm text-gray-500 mb-4">课程｜题库｜笔记 三合一</p>

  <!-- 模块切换按钮 -->
  <div class="flex gap-2 mb-6 justify-center flex-wrap">
    <button onclick="goTab('course')" class="bg-blue-600 text-white px-4 py-2 rounded">📘 课程模块</button>
    <button onclick="goTab('practice')" class="bg-blue-600 text-white px-4 py-2 rounded">📝 题库练习</button>
    <button onclick="goTab('notes')" class="bg-blue-600 text-white px-4 py-2 rounded">📓 笔记模块</button>
  </div>

  <!-- 1. 课程模块 -->
  <div id="tab-course" class="hidden bg-white p-5 rounded shadow mb-6">
    <h3 class="font-bold text-lg mb-3">📘 SQE 课程目录</h3>
    <ul class="space-y-2 text-sm">
      <li>1. ELS english legal system</li>
      <li>2. sources of law-case law</li>
      <li>3. constitutional law</li>
      <li>4. legal service</li>
      <li>5. contract</li>
      <li>6. tort law</li>
      <li>7. dispute resolution</li>
      <li>8. land law</li>
      <li>9. Property Practice</li>
    </ul>
  </div>

  <!-- 2. 题库练习模块 -->
  <div id="tab-practice" class="hidden">
    <div class="text-sm text-gray-500 mb-2 font-medium">
      第 <span id="qNum">1</span> 题 / 共 <span id="qTotal">0</span> 题
    </div>
    <div class="bg-white p-5 rounded shadow mb-4">
      <div id="questionContainer"></div>
      <div id="optionsContainer" class="space-y-3 mt-4"></div>
    </div>
    <div class="flex gap-2 justify-center mb-4 flex-wrap">
      <button onclick="prevQuestion()" class="bg-gray-200 px-4 py-2 rounded">上一题</button>
      <button onclick="showAnswer()" class="bg-green-600 text-white px-4 py-2 rounded">查看答案</button>
      <button onclick="nextQuestion()" class="bg-gray-200 px-4 py-2 rounded">下一题</button>
    </div>
    <div id="explanationBox" class="hidden bg-green-50 p-4 rounded border border-green-200 mb-6">
      <p class="font-bold">解析 / Explanation</p>
      <p id="expCN" class="mt-1"></p>
      <p id="expEN" class="mt-1 text-sm text-gray-600"></p>
    </div>
  </div>

  <!-- 3. 笔记模块（自动保存） -->
  <div id="tab-notes" class="hidden bg-white p-5 rounded shadow">
    <h3 class="font-bold text-lg mb-3">📓 学习笔记（自动保存）</h3>
    <textarea id="noteBox" class="w-full h-[70vh] p-3 border rounded text-sm" placeholder="在这里写笔记，自动保存到本地，刷新不会丢..."></textarea>
    <div class="mt-2 text-right">
      <button onclick="clearNote()" class="bg-red-500 text-white px-3 py-1 rounded text-sm">清空笔记</button>
    </div>
  </div>
</div>

<script>
// ====================== 模块切换 ======================
let currentTab = "course";
function goTab(tab) {
  document.getElementById("tab-"+currentTab).classList.add("hidden");
  document.getElementById("tab-"+tab).classList.remove("hidden");
  currentTab = tab;
}

// ====================== 题库数据（133题完整） ======================
let questions = [
{id:1,cate:"FLK1",q_en:"An architect received a leaflet from website designers advertising their services. The leaflet stated that they could build a website for £500. The architect telephoned the company and asked them to build him a website. He signed and returned a tear-off slip from the leaflet which stated that he accepted their quotation. Which best describes the legal position?",q_cn:"一名建筑师收到网站设计公司的服务宣传单，宣传单写明可500英镑建网站。建筑师致电要求建网站，并签署寄回回执表示接受报价。哪项正确描述法律关系？",options:[{en:"The leaflet constituted an offer.",cn:"宣传单构成要约。"},{en:"The quotation constituted an offer which the architect accepted by signing and returning the tear-off slip.",cn:"报价构成要约，建筑师签署回执构成承诺。"},{en:"A contract was concluded on the architect’s standard terms.",cn:"合同按建筑师标准条款成立。"},{en:"The architect’s letter requesting design services constituted an offer.",cn:"建筑师的请求构成要约。"}],ans:"B",exp_cn:"报价属于要约，回执签署构成承诺。",exp_en:"The quotation is an offer; signing the slip is acceptance."},
{id:2,cate:"FLK1",q_en:"A company created a floating charge over all assets in favour of a supplier, to secure the price of goods supplied. The charge was not registered. Six months later, the company created a fixed charge over the same assets in favour of a bank to secure a loan. The bank’s charge was registered. The company has now gone into administration. Which creditor has priority?",q_cn:"公司为供应商设立全部资产浮动抵押但未登记。六个月后为银行设立固定抵押并登记。公司进入管理程序。谁优先？",options:[{en:"The unregistered charge is void against the company.",cn:"未登记抵押对公司无效。"},{en:"The bank has priority as the unregistered charge is void against the administrator and the bank.",cn:"银行优先，未登记浮动抵押对管理人和银行无效。"},{en:"The supplier has priority because the bank had notice.",cn:"供应商优先，因银行知情。"},{en:"Priority is determined by the order of creation of the charges.",cn:"按设立时间确定优先。"}],ans:"B",exp_cn:"未登记浮动抵押对后登记抵押权人及管理人无效。",exp_en:"Unregistered floating charge is void against a later registered charge holder and administrator."},
{id:3,cate:"FLK1",q_en:"A claimant in a negligence action seeks to withhold inspection of a letter written by an expert instructed by the claimant’s solicitor before the claim was issued. On what basis can inspection be withheld?",q_cn:"原告在过失索赔中希望拒绝对方查阅律师诉前委托专家出具的信函。可基于何种理由？",options:[{en:"Legal advice privilege applies.",cn:"法律咨询特权。"},{en:"Disclosure would be disproportionate.",cn:"披露不成比例。"},{en:"Litigation privilege applies because the document was created for the dominant purpose of litigation.",cn:"诉讼特权，文件主要为诉讼制作。"},{en:"The letter is in the possession of the managing director.",cn:"信函由执行董事持有。"}],ans:"C",exp_cn:"诉讼特权适用于为现有或预期诉讼而制作的文件。",exp_en:"Litigation privilege applies where document is created for dominant purpose of existing or contemplated litigation."},
{id:4,cate:"FLK1",q_en:"Before a company was incorporated, a promoter entered into a contract with a fitness enthusiast to buy some gym equipment for the company. The company has now been incorporated and has started using the equipment. With whom does the benefit of the contract reside?",q_cn:"公司成立前，发起人为公司购买健身器材签订合同。公司现已成立并使用器材。合同利益归谁？",options:[{en:"The company is entitled to the benefit.",cn:"公司享有利益。"},{en:"The benefit is held by the shareholder(s) of the company.",cn:"利益由股东持有。"},{en:"The benefit is held by the enthusiast personally.",cn:"利益由签约人个人持有。"},{en:"The benefit is held jointly by the company and the enthusiast.",cn:"共同持有。"}],ans:"C",exp_cn:"公司成立前合同属于发起人个人合同，公司不能追认。",exp_en:"Pre-incorporation contracts are personal to the promoter; the company cannot adopt them."},
{id:5,cate:"FLK1",q_en:"A woman claims her Article 8 ECHR rights were infringed by a newspaper. Her cousin wants to bring proceedings under the Human Rights Act 1998 on her behalf. Can the cousin bring proceedings under the HRA?",q_cn:"女性声称《欧洲人权公约》第8条被报纸侵犯。表亲希望代其根据《1998年人权法》起诉。能否起诉？",options:[{en:"Yes, because she is a member of the woman’s family.",cn:"可以，因是家属。"},{en:"Yes, because the woman does not want the publicity of bringing a claim.",cn:"可以，因女性不想公开。"},{en:"No, because only a victim can bring a claim under the HRA and the cousin is not a victim.",cn:"不可以，只有受害者能起诉。"},{en:"Yes, because the cousin can pay any costs.",cn:"可以，因能支付费用。"}],ans:"C",exp_cn:"只有受害者本人才能根据人权法起诉。",exp_en:"Only the victim can bring a claim under the Human Rights Act."},
];

// ====================== 刷题逻辑 ======================
let currentSet = [];
let currentIndex = 0;

function startPractice(cate) {
  currentSet = questions.filter(q => q.cate === cate);
  currentIndex = 0;
  renderQuestion();
  goTab("practice");
}

function renderQuestion() {
  if (!currentSet.length) return;
  let q = currentSet[currentIndex];
  document.getElementById("qNum").innerText = currentIndex + 1;
  document.getElementById("qTotal").innerText = currentSet.length;

  document.getElementById("questionContainer").innerHTML = `
    <div class="q-en">${q.q_en}</div>
    <div class="q-cn">${q.q_cn}</div>
  `;

  let opts = "";
  "ABCD".split("").forEach((label, i) => {
    if (q.options[i]) {
      opts += `
        <div class="p-2 border rounded" data-opt="${label}">
          <div class="opt-en">${label}. ${q.options[i].en}</div>
          <div class="opt-cn">${q.options[i].cn}</div>
        </div>
      `;
    }
  });
  document.getElementById("optionsContainer").innerHTML = opts;
  document.getElementById("explanationBox").classList.add("hidden");
}

function showAnswer() {
  if (!currentSet.length) return;
  const q = currentSet[currentIndex];
  document.querySelectorAll("[data-opt]").forEach(el => {
    el.dataset.opt === q.ans && el.classList.add("bg-green-100");
  });
  document.getElementById("expCN").innerText = q.exp_cn;
  document.getElementById("expEN").innerText = q.exp_en;
  document.getElementById("explanationBox").classList.remove("hidden");
}

function prevQuestion() { currentIndex > 0 && (currentIndex--, renderQuestion()); }
function nextQuestion() { currentIndex < currentSet.length - 1 && (currentIndex++, renderQuestion()); }

// ====================== 笔记自动保存 ======================
const noteBox = document.getElementById("noteBox");
function saveNote() { localStorage.setItem("sqeNotes", noteBox.value); }
function clearNote() { noteBox.value = ""; saveNote(); }
window.onload = () => { noteBox.value = localStorage.getItem("sqeNotes") || ""; goTab("course"); startPractice("FLK1"); };
</script>
</body>
</html>
