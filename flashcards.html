<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQE Flashcards - 记忆卡片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        
        .stat-item {
            text-align: center;
            color: white;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 0.85rem;
            opacity: 0.9;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #4ade80;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .card-container {
            perspective: 1000px;
            margin-bottom: 30px;
        }
        
        .flashcard {
            width: 100%;
            height: 350px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }
        
        .flashcard.flipped {
            transform: rotateY(180deg);
        }
        
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .card-front {
            background: white;
            color: #333;
        }
        
        .card-back {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            transform: rotateY(180deg);
        }
        
        .card-label {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .card-back .card-label {
            background: rgba(255,255,255,0.3);
        }
        
        .card-content {
            font-size: 1.3rem;
            line-height: 1.6;
            max-height: 250px;
            overflow-y: auto;
        }
        
        .card-content small {
            font-size: 0.9rem;
            opacity: 0.8;
            display: block;
            margin-top: 10px;
        }
        
        .flip-hint {
            position: absolute;
            bottom: 15px;
            color: #999;
            font-size: 0.8rem;
        }
        
        .card-back .flip-hint {
            color: rgba(255,255,255,0.7);
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #4ade80;
            color: #166534;
        }
        
        .btn-success:hover {
            background: #22c55e;
        }
        
        .btn-danger {
            background: #f87171;
            color: white;
        }
        
        .btn-danger:hover {
            background: #ef4444;
        }
        
        .btn-secondary {
            background: white;
            color: #667eea;
        }
        
        .btn-secondary:hover {
            background: #f3f4f6;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .category-select {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .category-select select {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            background: white;
            color: #333;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .result-modal.show {
            display: flex;
        }
        
        .result-content {
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
        }
        
        .result-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        .result-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        .result-stats {
            margin: 20px 0;
            padding: 15px;
            background: #f3f4f6;
            border-radius: 8px;
        }
        
        @keyframes celebrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .celebrate {
            animation: celebrate 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 SQE Flashcards</h1>
            <p>英国遗嘱法 - 记忆卡片</p>
        </header>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="currentCard">1</div>
                <div class="stat-label">当前卡片</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalCards">0</div>
                <div class="stat-label">总卡片数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="masteredCount">0</div>
                <div class="stat-label">已掌握</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="remainingCount">0</div>
                <div class="stat-label">待复习</div>
            </div>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        
        <div class="category-select">
            <select id="categorySelect">
                <option value="all">全部类别</option>
                <option value="legacy">遗嘱赠与分类</option>
                <option value="failure">遗赠失败规则</option>
                <option value="alterations">遗嘱修改</option>
                <option value="business">商业法与公司治理</option>
                <option value="equity">信托法</option>
                <option value="land">土地法</option>
                <option value="tort">侵权法</option>
            </select>
        </div>
        
        <div class="card-container">
            <div class="flashcard" id="flashcard">
                <div class="card-face card-front">
                    <span class="card-label">问题</span>
                    <div class="card-content" id="questionContent">
                        点击开始学习
                    </div>
                    <span class="flip-hint">点击卡片翻转查看答案</span>
                </div>
                <div class="card-face card-back">
                    <span class="card-label">答案</span>
                    <div class="card-content" id="answerContent">
                        -
                    </div>
                    <span class="flip-hint">点击卡片翻转回问题</span>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn btn-secondary" id="prevBtn">◀ 上一张</button>
            <button class="btn btn-primary" id="shuffleBtn">🔀 随机复习</button>
            <button class="btn btn-success" id="masteredBtn">✅ 掌握了</button>
            <button class="btn btn-danger" id="retryBtn">🔄 再学一遍</button>
            <button class="btn btn-secondary" id="nextBtn">下一张 ▶</button>
        </div>
    </div>
    
    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <div class="result-icon" id="resultIcon">🎉</div>
            <div class="result-title" id="resultTitle">恭喜完成!</div>
            <div class="result-stats" id="resultStats"></div>
            <button class="btn btn-primary" id="restartBtn">重新开始</button>
        </div>
    </div>

    <script>
        // SQE 遗嘱法 flashcards 数据
        const flashcards = [
            {
                category: "legacy",
                question: "什么是 Specific Legacy（特定遗赠）？",
                answer: "指定赠与特定的物品，如'my diamond ring to Alice'。\n\n特点：\n• 必须是遗嘱人死亡时拥有的特定物品\n• 若物品不存在，赠与完全失效（adeems）\n• 关键词：'my' + 特定物品"
            },
            {
                category: "legacy",
                question: "什么是 General Legacy（一般遗赠）？",
                answer: "赠与一定金额或数量，如'£1,000 to Bob'。\n\n特点：\n• 从遗产任何可用资产支付\n• 若遗产不足，仍需支付（可能削减）\n• 关键词：无'my'，金额/数量"
            },
            {
                category: "legacy",
                question: "什么是 Residuary Legacy（剩余遗赠）？",
                answer: "赠与遗产剩余部分，如'All the rest of my estate to Carol'。\n\n特点：\n• 支付债务和所有其他赠与后的剩余部分\n• 必须包含，否则部分无遗嘱继承\n• 关键词：'all the rest'"
            },
            {
                category: "legacy",
                question: "Specific vs General Legacy 的核心区别？",
                answer: "【核心区别】\n• Specific：必须有特定物品存在，否则失效\n• General：无论什么资产支付，只要遗产有钱\n\n【记忆口诀】\nSpecific = 我的东西\nGeneral = 多少钱"
            },
            {
                category: "failure",
                question: "什么是 Ademption（撤回）？",
                answer: "特定遗赠的物品在遗嘱人死亡时不存在。\n\n例子：遗嘱说"把车留给儿子"，但车已经卖掉 → 遗赠失效\n\n【考点】：仅影响 Specific Legacy"
            },
            {
                category: "failure",
                question: "什么是 Lapse（失效）？",
                answer: "受益人在遗嘱人之前去世，遗赠失效。\n\n例子：遗嘱说"给儿子 £10万"，但儿子先去世 → 遗赠失效\n\n【例外】：如果受益人有后代，后代可以代位继承"
            },
            {
                category: "failure",
                question: "什么是 Ademption by Extinction？",
                answer: "特定物品在遗嘱人死后不存在（如已出售、损毁）。\n\n与 Ademption（生前已不存在）的区别：\n• Ademption：死前不存在\n• Ademption by Extinction：死后不存在"
            },
            {
                category: "alterations",
                question: "什么是 Codicil（遗嘱附录）？",
                answer: "对现有遗嘱的修改或补充。\n\n要求：\n• 必须书面\n• 需要见证（与遗嘱相同）\n• 可以添加、修改或撤销部分条款\n• 不能完全重写遗嘱"
            },
            {
                category: "alterations",
                question: "遗嘱修改后原遗嘱的效力？",
                answer: "【原则】\n• 与Codicil冲突的条款，以Codicil为准\n• 未修改的条款仍然有效\n\n【注意】\n• 完全废除：Codicil明确撤销\n• 部分冲突：后订的文件为准"
            },
            {
                category: "legacy",
                question: "Demonstrative Legacy 是什么？",
                answer: "指定从特定资金来源支付的一般遗赠。\n\n例子：'£1,000 from my bank account to Alice'\n\n特点：\n• 有特定资金来源，但仍是General Legacy\n• 若指定账户不足，从其他资产支付\n• 兼具体Specific和General特点"
            },
            {
                category: "failure",
                question: "什么是 Survivorship Requirement？",
                answer: "要求受益人在遗嘱人死后生存一定时间（通常30天）才能获得遗赠。\n\n目的：防止同时死亡导致的遗产纠纷\n\n【英国法】：默认30天 survivorship"
            },
            {
                category: "legacy",
                question: "Pecuniary Legacy 是什么？",
                answer: "金钱遗赠（pecuniary = 金钱的）。\n\n例子：'£5,000 to my nephew'\n\n特点：\n• 属于General Legacy\n• 必须支付（即使遗产不足可能削减）\n• 从剩余遗产优先支付"
            },
            // 商业法 Q&A
            {
                category: "business",
                question: "英国公司有哪些主要类型？",
                answer: "1. **Sole Trader**（独资企业）：简单，责任人无限\n2. **Partnership**（合伙）：2-20人，普通合伙人无限责任\n3. **LLP**（有限责任合伙）：合伙人有限责任\n4. **Limited Company**（有限责任公司）：股东有限责任\n5. **Public Limited Company (PLC)**：可以公开募股"
            },
            {
                category: "business",
                question: "什么是公司的 memorandum of association？",
                answer: "公司备忘录（Memorandum of Association）是公司的核心文件，包含：\n\n• **公司名称**\n• **注册地址**（必须在英国）\n• **公司目的**（现在通常是广泛表述）\n• **责任限制**（limited/unlimited）\n• **股本**（股份数量和面值）\n\n是公司的"出生证明""
            },
            {
                category: "business",
                question: "什么是 articles of association？",
                answer: "公司章程（Articles of Association）是公司的内部治理规则，规定：\n\n• 股东权利和投票程序\n• 董事会组成和权力\n• 股息分配规则\n• 董事任免程序\n• 会议召开程序\n\n可以修改，但需特殊决议（75%同意）"
            },
            {
                category: "business",
                question: "董事的基本职责有哪些？",
                answer: "英国公司法下董事有三大核心义务：\n\n1. **注意义务**（Care and Skill）：\n   - 合理勤勉地履行职责\n   - 需具备一般知识、技能和经验\n\n2. **忠实义务**（Duty of Loyalty）：\n   - 避免利益冲突\n   - 不接受第三人利益\n\n3. **促进公司成功**（s.172 Companies Act 2006）：\n   - 考虑股东、员工、供应商、社区等利益"
            },
            {
                category: "business",
                question: "什么是董事的注意义务？",
                answer: "注意义务（Care, Skill and Diligence）要求董事：\n\n• 达到一般人的合理注意标准\n• 对于专业董事（ accountant/solicitor），达到专业标准\n• 主动了解公司业务\n• 参加董事会会议\n• 寻求专业建议（必要时）\n\n违反可能导致个人责任"
            },
            {
                category: "business",
                question: "什么是董事的利益冲突？",
                answer: "利益冲突（Conflict of Interest）包括：\n\n• 与公司的交易（direct or indirect）\n• 使用公司机会或信息\n• 担任竞争对手董事\n• 关联公司交易\n\n**处理方式**：\n• 披露利益\n• 获得董事会批准\n• 记载在会议记录中"
            },
            {
                category: "business",
                question: "股东大会的普通决议 vs 特别决议？",
                answer: "**普通决议**（Ordinary Resolution）：\n• 简单多数（>50%）通过\n• 用于：任命董事、审计师、分配股息\n\n**特别决议**（Special Resolution）：\n• 75%及以上通过\n• 用于：修改章程、减少股本、公司解散\n\n注意：表决前需21天通知"
            },
            {
                category: "business",
                question: "什么是公司的派生诉讼（Derivative Action）？",
                answer: "派生诉讼允许股东以公司名义提起诉讼：\n\n**适用情况**：\n• 董事行为不当（如疏忽、越权）\n• 多数股东压迫少数股东\n• 公司权利被侵犯\n\n**前提条件**：\n• 需先请求公司起诉（通常董事会拒绝）\n• 法院许可（leave of the court）\n\n**目的**：保护公司利益，防止董事/高管不当行为"
            },
            {
                category: "business",
                question: "什么是 piercing the corporate veil？",
                answer: "揭开公司面纱（Piercing the Corporate Veil）是指在特定情况下，忽略公司的独立法律人格，让股东或董事对公司债务承担个人责任。\n\n**常见情形**：\n• 欺诈或违法行为\n• 公司形骸化（无独立意志）\n• 逃避法律义务\n• 逃避合同义务\n\n**注意**：法院很少这样做，需极其例外的情况"
            },
            {
                category: "equity",
                question: "什么是信托（Trust）？",
                answer: "信托是一种法律关系，其中受托人（Trustee）为受益人（Beneficiary）持有和管理财产。\n\n**三要素**：\n1. **确定性**（Certainty）：\n   - 确定性意图（settlor intent）\n   - 确定性标的（certainty of subject matter）\n   - 确定性对象（certainty of objects）\n\n2. **转让**（Constitution）：财产必须转移给受托人\n\n3. **目的合法**（Valid Purpose）"
            },
            {
                category: "equity",
                question: "Express Trust vs Implied Trust 的区别？",
                answer: "**明示信托（Express Trust）**：\n• 当事人明确设立（书面或口头）\n• 例子：信托契约、遗嘱中的信托\n\n**默示信托（Implied Trust）**：\n• 法律推断存在\n• 包括 Resulting Trust 和 Constructive Trust\n\n**Resulting Trust**：\n• 财产转让但未明确设立信托时适用\n• 用于保护转让人的利益\n\n**Constructive Trust**：\n• 法院因公平理由强加\n• 用于纠正不当行为"
            },
            {
                category: "equity",
                question: "什么是 resulting trust？",
                answer: "结果信托（Resulting Trust）是默示信托的一种：\n\n**当财产转让但未明确设立信托时**，法律假设转让人保留了受益权。\n\n**两种情况**：\n1. **明确转让但未设立信托**：财产返还给转让人\n2. **信托财产有剩余**：剩余部分归原始设立人\n\n**例子**：A转账给B买股票，但未说明用途 → B为A持有（resulting trust）"
            },
            {
                category: "equity",
                question: "什么是 constructive trust？",
                answer: "推定信托（Constructive Trust）是法院因公平理由强加的信托：\n\n**不要求当事人意图**，而是基于：\n\n1. **违反信任义务**：受托人违反职责\n2. **不當得利**：获得不应得的利益\n3. **欺诈行为**：通过欺诈获得财产\n\n**例子**：\n• 董事使用公司机会为自己谋利\n• 受托人挪用信托财产\n• 销售人员挪用客户资金"
            },
            {
                category: "land",
                question: "什么是 leasehold 租借地产权？",
                answer: "租借地产权（Leasehold）是租赁他人土地的财产权：\n\n**特点**：\n• 有固定期限（term of years）\n• 租户拥有占有权（exclusive possession）\n• 需支付租金\n\n**类型**：\n1. **Term of Years Absolute**：固定期限\n2. **Periodic Tenancy**：周期性租约（按周/月/年）\n3. **Tenancy at Will**：任意租约\n4. **Tenancy at Sufferance**：默许租约\n\n**重要**：Leasehold 在英国法下是财产（chattel），不是地产（land）"
            },
            {
                category: "land",
                question: "什么是 freehold 永久产权？",
                answer: "永久产权（Freehold）是土地的最高所有权：\n\n**两种形式**：\n1. **Fee Simple Absolute in Possession**：\n   - 永久无限制的所有权\n   - 可以继承\n   - 最强的土地权\n\n2. **Fee Tail**（已很少用）：\n   - 限定继承，只能由特定后代继承\n\n**对比**：\n- Freehold = 永久拥有\n- Leasehold = 租赁（通常99年等）"
            },
            {
                category: "land",
                question: "什么是 license to occupy？",
                answer: "占用许可（License to occupy）是允许进入和占用土地的权利，但不是财产利益：\n\n**与租约的区别**：\n- License：无独占占有权（可被驱逐）\n- Lease：有独占占有权\n\n**例子**：\n- 酒店房间\n- 体育场座位\n- 朋友借住家中\n\n**关键**：无独占占有 = License，有独占占有 = Lease"
            },
            {
                category: "land",
                question: "什么是 easements 地役权？",
                answer: "地役权（Easement）是一块土地对另一块土地的有限权利：\n\n**常见类型**：\n1. **Right of Way**：通行权\n2. **Right of Light**：采光权\n3. **Right of Support**：支撑权\n4. **Right to Water**：用水权\n\n**设立方式**：\n• 明示（Express）\n• 必要（Necessary）\n• 长期占有（Prescription）- 20年\n\n**特征**：\n- 必须有两个土地（dominant & servient）\n- 必须有利于 dominant land"
            },
            {
                category: "tort",
                question: "什么是 negligence 过失？",
                answer: "过失（Negligence）是违反注意义务导致损害：\n\n**三要素**：\n1. **注意义务**（Duty of Care）：对原告负有注意义务\n2. **违反义务**（Breach）：未达到合理标准\n3. **因果关系**（Causation）：违反导致损害\n\n**合理标准**：\n- 正常理智人的行为\n- 专业标准（如医生、律师）\n\n**注意义务来源**：\n- 邻接原则（Neighbour principle）\n- 特殊关系（如医患、师生）"
            },
            {
                category: "tort",
                question: "什么是 duty of care 注意义务？",
                answer: "注意义务是法律要求行为人对他人的合理关怀：\n\n**邻接原则（Caparo v Dickman）**：\n1. 可预见性（Foreseeability）\n2. 足够邻近（Proximity）\n3. 公平正义（Fair, Just and Reasonable）\n\n**职业注意义务**：\n- 医生：符合专业标准\n- 律师：符合执业标准\n- 建筑师：符合行业标准\n\n**注意**：过失侵权必须有实际损害才能索赔"
            },
            {
                category: "tort",
                question: "什么是 res ipsa loquitur？",
                answer: "事实自证（Res Ipsa Loquitur）是过失推定原则：\n\n**含义**："事实自己说话" - 事件本身就能证明过失\n\n**适用条件**：\n1. 事故本身通常不会发生（若无过失）\n2. 被告完全控制事故物/情况\n3. 排除原告过错\n\n**例子**：\n• 手术遗留纱布在体内\n• 建筑物倒塌\n• 电梯坠落\n\n**效果**：推定被告有过失，需被告反证"
            }
        ];

        // 学习进度
        let progress = {
            currentIndex: 0,
            mastered: new Set(),
            reviewQueue: [],
            shuffled: false
        };

        // DOM 元素
        const flashcard = document.getElementById('flashcard');
        const questionContent = document.getElementById('questionContent');
        const answerContent = document.getElementById('answerContent');
        const currentCardEl = document.getElementById('currentCard');
        const totalCardsEl = document.getElementById('totalCards');
        const masteredCountEl = document.getElementById('masteredCount');
        const remainingCountEl = document.getElementById('remainingCount');
        const progressFill = document.getElementById('progressFill');
        const categorySelect = document.getElementById('categorySelect');
        const resultModal = document.getElementById('resultModal');

        // 初始化
        function init() {
            loadProgress();
            filterCards();
            updateStats();
            showCard();
            
            // 本地存储进度
            saveProgress();
        }

        // 加载进度
        function loadProgress() {
            const saved = localStorage.getItem('sqe-flashcards-progress');
            if (saved) {
                const data = JSON.parse(saved);
                progress.mastered = new Set(data.mastered || []);
                progress.currentIndex = data.currentIndex || 0;
            }
        }

        // 保存进度
        function saveProgress() {
            localStorage.setItem('sqe-flashcards-progress', JSON.stringify({
                mastered: Array.from(progress.mastered),
                currentIndex: progress.currentIndex
            }));
        }

        // 筛选卡片
        function filterCards() {
            const category = categorySelect.value;
            progress.reviewQueue = flashcards.filter(card => {
                if (category === 'all') return true;
                return card.category === category;
            });
            
            // 移除已掌握的卡片（随机模式除外）
            if (!progress.shuffled) {
                progress.reviewQueue = progress.reviewQueue.filter((_, idx) => 
                    !progress.mastered.has(getOriginalIndex(idx))
                );
            }
            
            totalCardsEl.textContent = progress.reviewQueue.length;
        }

        // 获取原始索引
        function getOriginalIndex(filteredIndex) {
            const category = categorySelect.value;
            if (category === 'all') return filteredIndex;
            const filtered = flashcards.filter(c => c.category === category);
            const card = filtered[filteredIndex];
            return flashcards.indexOf(card);
        }

        // 显示卡片
        function showCard() {
            if (progress.reviewQueue.length === 0) {
                showResult();
                return;
            }
            
            const card = progress.reviewQueue[progress.currentIndex];
            questionContent.innerHTML = card.question;
            answerContent.innerHTML = card.answer.replace(/\n/g, '<br>');
            
            // 翻转回正面
            flashcard.classList.remove('flipped');
            
            currentCardEl.textContent = progress.currentIndex + 1;
            updateStats();
        }

        // 更新统计
        function updateStats() {
            const total = progress.reviewQueue.length;
            const mastered = progress.mastered.size;
            const remaining = total - progress.currentIndex - 1 + (total - progress.currentIndex - 1 >= 0 ? 0 : 0);
            
            masteredCountEl.textContent = mastered;
            
            const progressPercent = total > 0 ? ((progress.currentIndex + 1) / total) * 100 : 0;
            progressFill.style.width = progressPercent + '%';
        }

        // 翻转卡片
        flashcard.addEventListener('click', () => {
            flashcard.classList.toggle('flipped');
        });

        // 下一张
        document.getElementById('nextBtn').addEventListener('click', () => {
            if (progress.currentIndex < progress.reviewQueue.length - 1) {
                progress.currentIndex++;
                showCard();
                saveProgress();
            } else {
                showResult();
            }
        });

        // 上一张
        document.getElementById('prevBtn').addEventListener('click', () => {
            if (progress.currentIndex > 0) {
                progress.currentIndex--;
                showCard();
                saveProgress();
            }
        });

        // 随机复习
        document.getElementById('shuffleBtn').addEventListener('click', () => {
            progress.shuffled = true;
            progress.reviewQueue = [...flashcards].sort(() => Math.random() - 0.5);
            progress.currentIndex = 0;
            showCard();
            saveProgress();
        });

        // 掌握了
        document.getElementById('masteredBtn').addEventListener('click', () => {
            const originalIndex = getOriginalIndex(progress.currentIndex);
            progress.mastered.add(originalIndex);
            
            if (progress.currentIndex < progress.reviewQueue.length - 1) {
                progress.currentIndex++;
                showCard();
            } else {
                showResult();
            }
            saveProgress();
            updateStats();
        });

        // 再学一遍
        document.getElementById('retryBtn').addEventListener('click', () => {
            const currentCard = progress.reviewQueue[progress.currentIndex];
            progress.reviewQueue.push(currentCard);
            progress.currentIndex = progress.reviewQueue.length - 1;
            showCard();
            saveProgress();
        });

        // 类别筛选
        categorySelect.addEventListener('change', () => {
            progress.currentIndex = 0;
            progress.shuffled = false;
            filterCards();
            showCard();
        });

        // 显示结果
        function showResult() {
            const mastered = progress.mastered.size;
            const total = flashcards.length;
            const percentage = Math.round((mastered / total) * 100);
            
            document.getElementById('resultIcon').textContent = percentage >= 80 ? '🎉' : '📚';
            document.getElementById('resultTitle').textContent = percentage >= 80 ? '太棒了！' : '继续加油！';
            document.getElementById('resultStats').innerHTML = `
                <p>已掌握: ${mastered}/${total} 张</p>
                <p>进度: ${percentage}%</p>
            `;
            resultModal.classList.add('show');
        }

        // 重新开始
        document.getElementById('restartBtn').addEventListener('click', () => {
            resultModal.classList.remove('show');
            progress.currentIndex = 0;
            progress.shuffled = false;
            filterCards();
            showCard();
        });

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                flashcard.classList.toggle('flipped');
                e.preventDefault();
            } else if (e.code === 'ArrowRight') {
                document.getElementById('nextBtn').click();
            } else if (e.code === 'ArrowLeft') {
                document.getElementById('prevBtn').click();
            }
        });

        // 启动
        init();
    </script>
</body>
</html>
